services:
  headyide:
    build:
      context: .
      dockerfile: services/heady-ide/Dockerfile
      args:
        VITE_API_URL: ${CLOUD_RUN_URL:-https://headyme-site-667608982461.us-central1.run.app}
    ports:
      - "8080:8080"
    env_file:
      - services/heady-ide/.env.production
    environment:
      - PORT=8080
      - SERVE_STATIC=true
      - NODE_ENV=production
      - CLOUD_RUN_URL=${CLOUD_RUN_URL:-https://headyme-site-667608982461.us-central1.run.app}
      # Override secrets at runtime:
      # - DATABASE_URL=
      # - UPSTASH_REDIS_REST_URL=
      # - UPSTASH_REDIS_REST_TOKEN=
      # - FIREBASE_API_KEY=
      # - ANTHROPIC_API_KEY=
      # - OPENAI_API_KEY=
    networks:
      - heady-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  heady-net:
    driver: bridge
