name = "worker-heady-router"
main = "src/index.js"
compatibility_date = "2026-03-06"

[[kv_namespaces]]
binding = "HEADY_UI_MANIFEST"
id = "238f7a3f1c5c4060bfc07dccb78bd1ee"

[vars]
# HEADY_INTERNAL_TOKEN = "set via wrangler secret"
HEADY_ORIGIN_BASE = "https://heady-manager-1073792900703.us-east1.run.app"
COLAB_COMPILER_WEBHOOK = "https://heady-manager-1073792900703.us-east1.run.app/api/hologram/compile"

# Active recovery routes managed as infrastructure-as-code.
[[routes]]
pattern = "heady-ai.com/*"
